apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api-gateway
  namespace: vyne
  labels:
    app: api-gateway
    component: gateway
spec:
  replicas: 4
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: YOUR_AWS_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/vyne-api-gateway:latest
          ports:
            - containerPort: 1040
          envFrom:
            - secretRef:
                name: api-gateway-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 1040
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 1040
            initialDelaySeconds: 15
            periodSeconds: 30
  strategy:
    canary:
      # ── Traffic splitting ──────────────────────────────────────
      # Route a small % of traffic to the new version before full rollout.
      # Uses the canary service + stable service with the ALB ingress.
      canaryService: api-gateway-canary
      stableService: api-gateway-stable
      trafficRouting:
        alb:
          ingress: api-gateway-ingress
          servicePort: 1040
      # ── Rollout steps ──────────────────────────────────────────
      steps:
        - setWeight: 5        # 5% → canary
        - pause:
            duration: 2m      # Observe for 2 min
        - analysis:
            templates:
              - templateName: api-gateway-success-rate
        - setWeight: 20       # 20% → canary
        - pause:
            duration: 5m
        - analysis:
            templates:
              - templateName: api-gateway-success-rate
        - setWeight: 50       # 50% → canary
        - pause:
            duration: 5m
        - setWeight: 100      # Full rollout
      # ── Automatic rollback ─────────────────────────────────────
      # If the analysis fails (error rate spikes), roll back automatically.
      autoPromotionEnabled: false  # Require explicit promotion or passing analysis
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-stable
  namespace: vyne
spec:
  selector:
    app: api-gateway
  ports:
    - port: 1040
      targetPort: 1040
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-canary
  namespace: vyne
spec:
  selector:
    app: api-gateway
  ports:
    - port: 1040
      targetPort: 1040
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: api-gateway-success-rate
  namespace: vyne
spec:
  args:
    - name: service-name
      value: api-gateway-canary
  metrics:
    - name: success-rate
      interval: 30s
      successCondition: result[0] >= 0.95   # >95% success rate required
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{job="{{args.service-name}}",code=~"2.."}[2m]))
            /
            sum(rate(http_requests_total{job="{{args.service-name}}"}[2m]))
    - name: p99-latency
      interval: 30s
      successCondition: result[0] <= 2.0    # p99 latency <= 2s
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          query: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{job="{{args.service-name}}"}[2m]))
              by (le)
            )
