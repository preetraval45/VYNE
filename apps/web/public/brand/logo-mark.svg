<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep-space background -->
  <rect width="120" height="120" rx="28" fill="url(#bg)"/>

  <!-- Layer 3: wide aura bloom -->
  <path d="M22 32 L60 86 L98 32"
    stroke="url(#vg)" stroke-width="41" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.11"/>
  <!-- Layer 2: mid glow -->
  <path d="M22 32 L60 86 L98 32"
    stroke="url(#vg)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.22"/>
  <!-- Layer 1: crisp core V -->
  <path d="M22 32 L60 86 L98 32"
    stroke="url(#vg)" stroke-width="10.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Vertex dot — outer halo + bright core -->
  <circle cx="60" cy="86" r="17" fill="url(#dg)" opacity="0.18"/>
  <circle cx="60" cy="86" r="8"  fill="url(#dg)"/>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070010"/>
      <stop offset="1" stop-color="#0F0028"/>
    </linearGradient>
    <!-- Aurora sweep: purple → indigo → cyan, horizontal across the V arms -->
    <linearGradient id="vg" x1="22" y1="32" x2="98" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C084FC"/>
      <stop offset="0.45" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="dg" cx="50%" cy="30%" r="60%">
      <stop stop-color="#E0F9FF"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </radialGradient>
  </defs>
</svg>
