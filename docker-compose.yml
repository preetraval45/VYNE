version: "3.9"

# ============================================================
# VYNE — Local Development Docker Compose
# Runs all infrastructure + services with hot reload
# Usage: docker compose up -d
# ============================================================

networks:
  vyne-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:
  # ── Infrastructure ─────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg17
    container_name: vyne-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vyne
      POSTGRES_PASSWORD: vyne_dev_password
      POSTGRES_DB: vyne_dev
    ports:
      - "100:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - vyne-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vyne -d vyne_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: valkey/valkey:8-alpine
    container_name: vyne-redis
    restart: unless-stopped
    ports:
      - "101:6379"
    volumes:
      - redis-data:/data
    networks:
      - vyne-network
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── LocalStack (AWS services emulation for local dev) ───────
  localstack:
    image: localstack/localstack:3.8
    container_name: vyne-localstack
    restart: unless-stopped
    ports:
      - "102:4566"
    environment:
      SERVICES: s3,sqs,sns,secretsmanager,eventbridge,cognito-idp
      DEBUG: 0
      DATA_DIR: /tmp/localstack/data
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
    networks:
      - vyne-network

  # ── API Gateway ────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile.dev
    container_name: vyne-api-gateway
    restart: unless-stopped
    ports:
      - "104:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://vyne:vyne_dev_password@postgres:5432/vyne_dev
      REDIS_URL: redis://redis:6379
      CORE_SERVICE_URL: http://core-service:5001
      PROJECTS_SERVICE_URL: http://projects-service:5002
      MESSAGING_SERVICE_URL: http://messaging-service:5003
      AI_SERVICE_URL: http://ai-service:5004
      ERP_SERVICE_URL: http://erp-service:5005
      OBSERVABILITY_SERVICE_URL: http://observability-service:5006
      NOTIFICATION_SERVICE_URL: http://notification-service:5007
      JWT_SECRET: local_dev_jwt_secret_replace_in_production
      SOCKET_IO_CORS_ORIGIN: http://localhost:3001
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - ./services/api-gateway:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vyne-network

  # ── Core Service (C# .NET 9) ───────────────────────────────
  core-service:
    build:
      context: ./services/core-service
      dockerfile: Dockerfile.dev
    container_name: vyne-core-service
    restart: unless-stopped
    ports:
      - "105:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=vyne_dev;Username=vyne;Password=vyne_dev_password
      Aws__Region: us-east-1
      Aws__EndpointUrl: http://localstack:4566
      Aws__AccessKeyId: test
      Aws__SecretAccessKey: test
      Cognito__UserPoolId: local_pool
      Cognito__ClientId: local_client
      Jwt__Secret: local_dev_jwt_secret_replace_in_production
    volumes:
      - ./services/core-service:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vyne-network

  # ── Projects Service (C# .NET 9) ──────────────────────────
  projects-service:
    build:
      context: ./services/projects-service
      dockerfile: Dockerfile.dev
    container_name: vyne-projects-service
    restart: unless-stopped
    ports:
      - "106:5002"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5002
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=vyne_dev;Username=vyne;Password=vyne_dev_password
      Aws__Region: us-east-1
      Aws__EndpointUrl: http://localstack:4566
      Aws__AccessKeyId: test
      Aws__SecretAccessKey: test
      EventBridge__BusName: vyne-events
    volumes:
      - ./services/projects-service:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vyne-network

  # ── Messaging Service (Node.js + Fastify) ─────────────────
  messaging-service:
    build:
      context: ./services/messaging-service
      dockerfile: Dockerfile.dev
    container_name: vyne-messaging-service
    restart: unless-stopped
    ports:
      - "107:5003"
    environment:
      NODE_ENV: development
      PORT: 5003
      DATABASE_URL: postgresql://vyne:vyne_dev_password@postgres:5432/vyne_dev
      REDIS_URL: redis://redis:6379
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      EVENTBRIDGE_BUS_NAME: vyne-events
      S3_BUCKET: vyne-files-dev
    volumes:
      - ./services/messaging-service:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vyne-network

  # ── AI Service (Python FastAPI) ────────────────────────────
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile.dev
    container_name: vyne-ai-service
    restart: unless-stopped
    ports:
      - "108:5004"
    environment:
      ENVIRONMENT: development
      PORT: 5004
      DATABASE_URL: postgresql://vyne:vyne_dev_password@postgres:5432/vyne_dev
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      BEDROCK_REGION: us-east-1
      BEDROCK_MODEL_ID: anthropic.claude-3-5-sonnet-20241022-v2:0
      BEDROCK_EMBEDDING_MODEL_ID: amazon.titan-embed-text-v2:0
      SQS_AI_QUEUE_URL: http://localstack:4566/000000000000/vyne-ai.fifo
    volumes:
      - ./services/ai-service:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vyne-network

  # ── ERP Service (C# .NET 9) ────────────────────────────────
  erp-service:
    build:
      context: ./services/erp-service
      dockerfile: Dockerfile.dev
    container_name: vyne-erp-service
    restart: unless-stopped
    ports:
      - "109:5005"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5005
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=vyne_dev;Username=vyne;Password=vyne_dev_password
      Aws__Region: us-east-1
      Aws__EndpointUrl: http://localstack:4566
      Aws__AccessKeyId: test
      Aws__SecretAccessKey: test
      EventBridge__BusName: vyne-events
    volumes:
      - ./services/erp-service:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vyne-network

  # ── Observability Service (Python FastAPI) ─────────────────
  observability-service:
    build:
      context: ./services/observability-service
      dockerfile: Dockerfile.dev
    container_name: vyne-observability-service
    restart: unless-stopped
    ports:
      - "110:5006"
    environment:
      ENVIRONMENT: development
      PORT: 5006
      DATABASE_URL: postgresql://vyne:vyne_dev_password@postgres:5432/vyne_dev
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - ./services/observability-service:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vyne-network

  # ── Notification Service (Node.js) ─────────────────────────
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile.dev
    container_name: vyne-notification-service
    restart: unless-stopped
    ports:
      - "1110:5007"
    environment:
      NODE_ENV: development
      PORT: 5007
      DATABASE_URL: postgresql://vyne:vyne_dev_password@postgres:5432/vyne_dev
      REDIS_URL: redis://redis:6379
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - ./services/notification-service:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vyne-network

  # ── Code Service (Node.js) ──────────────────────────────────
  code-service:
    build:
      context: ./services/code-service
      dockerfile: Dockerfile.dev
    container_name: vyne-code-service
    restart: unless-stopped
    ports:
      - "112:5008"
    environment:
      NODE_ENV: development
      PORT: 5008
      DATABASE_URL: postgresql://vyne:vyne_dev_password@postgres:5432/vyne_dev
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      GITHUB_WEBHOOK_SECRET: local_dev_webhook_secret
    volumes:
      - ./services/code-service:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vyne-network

  # ── Web App (Next.js 15) ───────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: vyne-web
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:104
      NEXT_PUBLIC_WS_URL: ws://localhost:104
      NEXT_PUBLIC_DEMO_MODE: "true"
      NEXT_PUBLIC_COGNITO_USER_POOL_ID: local_pool
      NEXT_PUBLIC_COGNITO_CLIENT_ID: local_client
      NEXT_PUBLIC_COGNITO_REGION: us-east-1
      NEXT_PUBLIC_APP_ENV: development
      NEXTAUTH_URL: http://localhost:3100
      NEXTAUTH_SECRET: local_dev_nextauth_secret_32chars_min
    depends_on:
      - api-gateway
    networks:
      - vyne-network
